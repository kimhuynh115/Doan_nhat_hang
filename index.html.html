<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>VJ Fare Average OCR Tool</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: auto;
      padding: 20px;
      background: #f6f7fb;
    }
    h2 { color: #d71920; }
    .box {
      background: white;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    input, button, textarea {
      font-size: 16px;
      padding: 8px;
      margin: 6px 0;
    }
    textarea {
      width: 100%;
      height: 220px;
      font-family: monospace;
    }
    button {
      cursor: pointer;
      background: #d71920;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 12px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: right;
    }
    th:first-child, td:first-child { text-align: left; }
    .result {
      font-size: 22px;
      font-weight: bold;
      color: #003399;
      margin-top: 12px;
    }
    .note { color: #555; font-size: 14px; }
  </style>
</head>

<body>
  <h2>VJ Fare Average OCR Tool</h2>

  <div class="box">
    <b>1. Upload ảnh Fare Selection</b><br>
    <input type="file" id="imageInput" accept="image/*"><br>
    <button onclick="runOCR()">Đọc ảnh OCR</button>
    <div id="ocrStatus" class="note"></div>
  </div>

  <div class="box">
    <b>2. Số khách cần tính</b><br>
    <input type="number" id="paxInput" value="66" min="1">
  </div>

  <div class="box">
    <b>3. Text OCR / có thể sửa tay nếu OCR sai</b>
    <textarea id="ocrText" placeholder="Sau khi OCR, text sẽ hiện ở đây..."></textarea>
    <button onclick="calculate()">Tính Average</button>
    <button onclick="loadSample()">Load mẫu hình test</button>
  </div>

  <div class="box">
    <b>Kết quả</b>
    <div id="summary" class="result"></div>
    <table id="resultTable"></table>
  </div>

<script>
async function runOCR() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) {
    alert("Chọn ảnh trước.");
    return;
  }

  document.getElementById("ocrStatus").innerText = "Đang OCR ảnh, vui lòng chờ...";
  document.getElementById("summary").innerText = "";

  const result = await Tesseract.recognize(file, "eng", {
    logger: m => {
      if (m.status && m.progress) {
        document.getElementById("ocrStatus").innerText =
          `${m.status}: ${Math.round(m.progress * 100)}%`;
      }
    }
  });

  document.getElementById("ocrText").value = result.data.text;
  document.getElementById("ocrStatus").innerText =
    "OCR xong. Kiểm tra lại Fare Class / Fare / Availability rồi bấm Tính Average.";
}

function loadSample() {
  document.getElementById("ocrText").value =
`B1_ECO 4,050,000.00 14
H1_ECO 4,920,000.00 28
K1_ECO 5,810,000.00 47
L1_ECO 6,750,000.00 65
M1_ECO 7,790,000.00 77`;
  document.getElementById("paxInput").value = 66;
}

function parseMoney(s) {
  return Number(String(s).replace(/,/g, "").replace(".00", ""));
}

function money(n) {
  return Math.round(n).toLocaleString("vi-VN");
}

function extractRows(text) {
  const lines = text.split(/\n/);
  const rows = [];

  for (let line of lines) {
    line = line.replace(/\s+/g, " ").trim();

    const fareClassMatch = line.match(/\b[A-Z][0-9A-Z]?_ECO\b/i);
    if (!fareClassMatch) continue;

    const fareClass = fareClassMatch[0].toUpperCase();

    const moneyMatch = line.match(/[\d]{1,3}(?:,[\d]{3})+(?:\.00)?/);
    if (!moneyMatch) continue;

    const fare = parseMoney(moneyMatch[0]);

    const afterMoney = line.slice(line.indexOf(moneyMatch[0]) + moneyMatch[0].length);
    const nums = afterMoney.match(/\b\d+\b/g);
    if (!nums || nums.length === 0) continue;

    const availability = Number(nums[0]);

    rows.push({
      fareClass,
      fare,
      availability
    });
  }

  const unique = {};
  for (const r of rows) {
    unique[r.fareClass] = r;
  }

  return Object.values(unique).sort((a, b) => a.fare - b.fare);
}

function calculate() {
  const paxNeeded = Number(document.getElementById("paxInput").value);
  const text = document.getElementById("ocrText").value;

  if (!paxNeeded || paxNeeded <= 0) {
    alert("Nhập số khách hợp lệ.");
    return;
  }

  const rows = extractRows(text).filter(r => r.availability > 0);

  if (rows.length === 0) {
    document.getElementById("summary").innerText =
      "Không đọc được fare table. Hãy sửa text OCR hoặc nhập tay theo dạng: B1_ECO 4,050,000.00 14";
    document.getElementById("resultTable").innerHTML = "";
    return;
  }

  let remaining = paxNeeded;
  let previousAvailability = 0;
  let total = 0;
  const result = [];

  for (const r of rows) {
    const bucketSeats = Math.max(0, r.availability - previousAvailability);
    previousAvailability = r.availability;

    const take = Math.min(remaining, bucketSeats);

    if (take > 0) {
      result.push({
        fareClass: r.fareClass,
        pax: take,
        fare: r.fare,
        amount: take * r.fare,
        cumulativeAvailability: r.availability
      });

      total += take * r.fare;
      remaining -= take;
    }

    if (remaining <= 0) break;
  }

  const usedPax = paxNeeded - remaining;
  const average = usedPax > 0 ? total / usedPax : 0;

  let summary = `Average = ${money(average)} đ/pax`;
  if (remaining > 0) {
    summary += ` | Còn thiếu ${remaining} khách do không đủ availability`;
  }

  document.getElementById("summary").innerText = summary;

  let html = `
    <tr>
      <th>Fare Class</th>
      <th>Khách lấy</th>
      <th>Fare</th>
      <th>Availability tích lũy</th>
      <th>Thành tiền</th>
    </tr>
  `;

  for (const r of result) {
    html += `
      <tr>
        <td>${r.fareClass}</td>
        <td>${r.pax}</td>
        <td>${money(r.fare)}</td>
        <td>${r.cumulativeAvailability}</td>
        <td>${money(r.amount)}</td>
      </tr>
    `;
  }

  html += `
    <tr>
      <th>Total</th>
      <th>${usedPax}</th>
      <th></th>
      <th></th>
      <th>${money(total)}</th>
    </tr>
  `;

  document.getElementById("resultTable").innerHTML = html;
}
</script>

</body>
</html>
